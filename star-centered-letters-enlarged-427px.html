<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great American Star - Letters in Star's Central Pentagon</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 2000px;
            width: 100%;
            text-align: center;
            padding: 20px;
        }

        .title {
            font-size: 2em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        .star-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            position: relative;
            width: 1200px;
            height: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .letter {
            position: absolute;
            font-family: 'Georgia', serif;
            font-weight: bold;
            font-size: 14px;
            color: #0000ff;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            user-select: none;
        }

        .copyright {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 0.8em;
            opacity: 0.7;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 5px;
        }

        .info {
            position: fixed;
            top: 10px;
            left: 10px;
            font-size: 0.8em;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Great American Star - Letters in Star's Central Pentagon</h1>
        
        <div class="star-container" id="starContainer">
            <!-- Star and letters will be placed here by JavaScript -->
        </div>
    </div>

    <div class="info">
        <strong>ENLARGED STAR DESIGN:</strong><br>
        ⭐ Star outer radius: 1068px<br>
        📐 Star inner pentagon: 427px<br>
        🔽 Letter pentagon tip pointing down<br>
        🎯 Clean, uncluttered appearance<br>
        <strong>Mathematical precision!</strong>
    </div>

    <div class="copyright">© RABBIDANCZIGER@GMAIL.COM</div>

    <script>
        function createStarWithLetters() {
            const container = document.getElementById('starContainer');
            
            // Create SVG for the star
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.style.position = 'absolute';
            svg.style.top = '0';
            svg.style.left = '0';
            svg.style.width = '100%';
            svg.style.height = '100%';
            svg.style.pointerEvents = 'none';
            svg.style.zIndex = '1';
            svg.setAttribute('viewBox', '0 0 1200 1200');
            
            // Create perfect 5-pointed star centered in container
            const starCenterX = 600;
            const starCenterY = 600;
            const starOuterRadius = 1068; // Enlarged star overall
            const starInnerRadius = 427; // Enlarged inner pentagon radius to 427px
            
            // Calculate star points (tip pointing up)
            const starPoints = [];
            for (let i = 0; i < 10; i++) {
                const angle = (i * 36 - 90) * Math.PI / 180; // Start from top
                const radius = i % 2 === 0 ? starOuterRadius : starInnerRadius;
                starPoints.push(
                    starCenterX + radius * Math.cos(angle),
                    starCenterY + radius * Math.sin(angle)
                );
            }
            
            // Create star path
            const starPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            const pathData = `M ${starPoints[0]},${starPoints[1]} ` + 
                           starPoints.slice(2).reduce((acc, point, i) => 
                               acc + (i % 2 === 0 ? `L ${point},` : `${point} `), '') + 'Z';
            starPath.setAttribute('d', pathData);
            starPath.style.fill = 'none';
            starPath.style.stroke = '#ff0000';
            starPath.style.strokeWidth = '4';
            starPath.style.strokeOpacity = '0.8';
            starPath.style.strokeDasharray = '10,5';
            svg.appendChild(starPath);
            
            // Green pentagon outline removed for cleaner look
            
            container.appendChild(svg);
            
            // Now arrange letters using the star's inner pentagon as the base
            const letterCenterX = starCenterX;
            const letterCenterY = starCenterY;
            
            // Define all the rings for "UNITEDSTATESofAMERICA250"
            const rings = [
                // UNITED - no gaps
                { letter: 'U', count: 50, sides: 11, radius: 200, gapSize: 0 },   // Ring 1
                { letter: 'N', count: 55, sides: 12, radius: 220, gapSize: 0 },   // Ring 2
                { letter: 'I', count: 60, sides: 13, radius: 240, gapSize: 0 },   // Ring 3
                { letter: 'T', count: 65, sides: 14, radius: 260, gapSize: 0 },   // Ring 4
                { letter: 'E', count: 70, sides: 15, radius: 280, gapSize: 0 },   // Ring 5
                { letter: 'D', count: 75, sides: 16, radius: 300, gapSize: 0 },   // Ring 6
                
                // STATES - no gaps
                { letter: 'S', count: 80, sides: 17, radius: 320, gapSize: 0 },   // Ring 7
                { letter: 'T', count: 85, sides: 18, radius: 340, gapSize: 0 },   // Ring 8
                { letter: 'A', count: 90, sides: 19, radius: 360, gapSize: 0 },   // Ring 9
                { letter: 'T', count: 95, sides: 20, radius: 380, gapSize: 0 },   // Ring 10
                { letter: 'E', count: 100, sides: 21, radius: 400, gapSize: 0 },  // Ring 11
                { letter: 'S', count: 105, sides: 22, radius: 420, gapSize: 0 },  // Ring 12
                
                // of - small gaps
                { letter: 'o', count: 110, sides: 23, radius: 440, gapSize: 1 },  // Ring 13
                { letter: 'f', count: 115, sides: 24, radius: 460, gapSize: 2 },  // Ring 14
                
                // AMERICA - progressive gaps
                { letter: 'A', count: 120, sides: 25, radius: 480, gapSize: 3 },  // Ring 15
                { letter: 'M', count: 125, sides: 26, radius: 500, gapSize: 4 },  // Ring 16
                { letter: 'E', count: 130, sides: 27, radius: 520, gapSize: 5 },  // Ring 17
                { letter: 'R', count: 135, sides: 28, radius: 540, gapSize: 6 },  // Ring 18
                { letter: 'I', count: 140, sides: 29, radius: 560, gapSize: 7 },  // Ring 19
                { letter: 'C', count: 145, sides: 30, radius: 580, gapSize: 8 },  // Ring 20
                { letter: 'A', count: 150, sides: 31, radius: 600, gapSize: 9 },  // Ring 21
                
                // 250 - largest gaps
                { letter: '2', count: 155, sides: 32, radius: 620, gapSize: 10 }, // Ring 22
                { letter: '5', count: 160, sides: 33, radius: 640, gapSize: 11 }, // Ring 23
                { letter: '0', count: 165, sides: 34, radius: 660, gapSize: 12 }  // Ring 24
            ];
            
            let totalCount = 0;
            
            // Define colors for each side of the pentagon
            const sideColors = [
                '#ff0000', // Side 0: Red
                '#00ff00', // Side 1: Green
                '#0000ff', // Side 2: Blue
                '#ff8800', // Side 3: Orange
                '#8800ff'  // Side 4: Purple
            ];
            
            // Create each ring based on the star's inner pentagon
            rings.forEach((ring, ringIndex) => {
                // Pentagon vertices for this ring (tip pointing down)
                const vertices = [];
                for (let i = 0; i < 5; i++) {
                    const angle = (-90 + 36 + (i * 72)) * Math.PI / 180; // Tip pointing down
                    vertices.push({
                        x: letterCenterX + ring.radius * Math.cos(angle),
                        y: letterCenterY + ring.radius * Math.sin(angle)
                    });
                }
                
                let ringCount = 0;
                
                // Place letters on each side of the pentagon
                for (let side = 0; side < 5; side++) {
                    const startVertex = vertices[side];
                    const endVertex = vertices[(side + 1) % 5];
                    const lettersPerSide = ring.sides;
                    
                    for (let i = 0; i < lettersPerSide; i++) {
                        const t = i / (lettersPerSide - 1);
                        const x = startVertex.x + t * (endVertex.x - startVertex.x);
                        const y = startVertex.y + t * (endVertex.y - startVertex.y);
                        
                        // Skip if this is a corner and we already placed it
                        if (i === 0 && side > 0) continue;
                        
                        // Apply gap pattern based on gapSize
                        if (ring.gapSize > 0) {
                            const skipStart = 0;
                            const skipEnd = lettersPerSide - 1;
                            
                            if (i >= skipStart && i < skipStart + ring.gapSize) continue;
                            if (i > skipEnd - ring.gapSize && i <= skipEnd) continue;
                        }
                        
                        const letterElement = document.createElement('div');
                        letterElement.className = 'letter';
                        letterElement.textContent = ring.letter;
                        letterElement.style.left = (x - 7) + 'px';
                        letterElement.style.top = (y - 7) + 'px';
                        letterElement.style.zIndex = '2';
                        
                        // Apply color for U letters based on side
                        if (ring.letter === 'U') {
                            letterElement.style.color = sideColors[side];
                        }
                        
                        container.appendChild(letterElement);
                        ringCount++;
                        totalCount++;
                    }
                }
                
                console.log(`Ring ${ringIndex + 1}: Placed ${ringCount} ${ring.letter} letters`);
            });
            
            console.log(`Total letters placed: ${totalCount}`);
            console.log('ENLARGED STAR ARRANGEMENT COMPLETE!');
            console.log(`Star outer radius: ${starOuterRadius}px, inner pentagon: ${starInnerRadius}px`);
            console.log(`Letters arranged in star's inner pentagon at (${letterCenterX}, ${letterCenterY})`);
            console.log('Letter pentagon tip pointing DOWN, star tip pointing UP');
        }
        
        // Create the star and letters when page loads
        window.addEventListener('load', createStarWithLetters);
    </script>
</body>
</html>
